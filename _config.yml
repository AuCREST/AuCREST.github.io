# Site settings
title: Collaborative Research for Election Security and Trustworthiness 
email: michelle.blom@unimelb.edu.au
description: Website for the  Collaborative Research for Election Security and Trustworthiness group
baseurl: ""
url: ""

# Footer info
contact: >
    <a href="mailto:michelle.blom@unimelb.edu.au" target="_blank"><i class="fa fa-envelope fa-1x"></i> Contact CREST via email</a> <br/>
    <a href="https://github.com/sbryngelson/academic-website-template"><i class="fa fa-github fa-1x"></i> Use this site as a template!</a>

# Pages shown in navbar
nav_pages:
  - name: people
  - name: news
  - name: research
  - name: publications

include:
  - .htaccess
  - _pages

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true # default for kramdown is false. This will enable using Markdown links



exclude:
  - Gemfile
  - Gemfile.lock
  - update_boostrap.sh
  - switch_theme.sh
  - tags
  - Rakefile
